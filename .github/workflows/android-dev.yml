name: "Deploy Dev to Play Store"

on:
  workflow_dispatch: { }
  push:
    branches: [ main ]
    tags:
      - "dev-*"
    paths:
      - 'lib/**'
      - 'android/**'
      - 'pubspec.yaml'
      - 'shared/**'

permissions:
  id-token: write
  contents: read

concurrency:
  group: "android-dev"
  cancel-in-progress: true

jobs:
  unit-tests:
    name: "Unit Tests"
    uses: ./.github/workflows/unit-tests.yml

  dev:
    uses: ./.github/workflows/google-play-deployment.yml
    name: "Deploy Dev"
    needs: [ unit-tests ]
    permissions:
      id-token: write
      contents: read
    with:
      app_id: 'me.heart.android.dev'
      aws_region: 'ca-central-1'
      aws_role: 'arn:aws:iam::583168578067:role/heart-github-actions-deploy-role'
      environment: 'dev'
      flavor: 'dev'
      secrets_bucket: '583168578067-ca-central-1-static'
      track: 'internal'