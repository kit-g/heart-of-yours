name: "iOS TestFlight Deployment"

on:
  workflow_call:
    inputs:
      aws_region:
        required: true
        type: string
        description: "AWS region where secrets are stored"
      aws_role:
        required: true
        type: string
        description: "AWS role to assume to get secrets"
      secrets_bucket:
        required: true
        type: string
        description: "S3 bucket where secrets are stored"
      environment:
        required: true
        type: string
        description: "App environment (dev or prod)"
      flavor:
        required: true
        type: string
        description: "Flutter flavour"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: "Deploy to TestFlight"
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws_role }}
          aws-region: ${{ inputs.aws_region }}

      - name: "Fetch secrets from S3"
        # Download the Apple API Key, Firebase Plist, Match Passphrase, and Flutter Firebase options
        run: |
          aws s3 cp s3://${{ inputs.secrets_bucket }}/secrets/appstore/AuthKey_CKGD3LH3ZH.p8 ios/fastlane/AuthKey_CKGD3LH3ZH.p8
          aws s3 cp s3://${{ inputs.secrets_bucket }}/secrets/appstore/appstore_key.json ios/fastlane/appstore_key.json
          
          # Fetch Match passphrase
          aws s3 cp s3://${{ inputs.secrets_bucket }}/secrets/appstore/fastlane_passphrase.txt ios/fastlane/passphrase.txt
          
          # Fetch Firebase files
          mkdir -p ios/Env/${{ inputs.environment }}
          aws s3 cp s3://${{ inputs.secrets_bucket }}/secrets/firebase/GoogleService-Info.plist ios/Env/${{ inputs.environment }}/GoogleService-Info.plist
          aws s3 cp s3://${{ inputs.secrets_bucket }}/secrets/firebase/firebase_options.dart lib/firebase_options.dart
          aws s3 cp s3://${{ inputs.secrets_bucket }}/secrets/firebase/firebase_options_prod.dart lib/firebase_options_prod.dart

      - name: "Set up Flutter"
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: 'stable'
          cache: true

      - name: "Build"
        run: flutter build ios --release --flavor ${{ inputs.flavor }} --no-codesign

      - name: "Install Fastlane dependencies"
        working-directory: ios
        run: bundle install

      - name: "Download Certificates via Fastlane Match"
        working-directory: ios
        run: |
          export MATCH_PASSWORD=$(cat fastlane/passphrase.txt)
          export MATCH_S3_BUCKET=${{ inputs.secrets_bucket }}
          bundle exec fastlane match appstore --readonly true --app_identifier me.heart-of.ios.${{ inputs.environment }}

      - name: "Build iOS App with Flutter"
        run: |
          flutter build ipa --release --flavor ${{ inputs.flavor }} --build-number ${{ github.run_number }} --export-options-plist=ios/fastlane/ExportOptions.plist      

      - name: "Deploy via Fastlane"
        working-directory: ios
        # Read the passphrase downloaded from S3 and pass it to Fastlane via MATCH_PASSWORD
        run: |
          export MATCH_PASSWORD=$(cat fastlane/passphrase.txt)
          export MATCH_S3_BUCKET=${{ inputs.secrets_bucket }}
          export APPSTORE_USERNAME=$(jq -r '.username' fastlane/appstore_key.json)
          bundle exec fastlane beta env:${{ inputs.environment }}