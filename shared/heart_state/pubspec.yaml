name: heart_state
description: "State authority"
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.10.0
  flutter: ">=1.17.0"

dependencies:
  firebase_auth: ^6.3.0
  firebase_core: 4.6.0
  flutter: { sdk: flutter }
  google_sign_in: ^7.2.0
  heart_models:
    git:
      url: "https://github.com/kit-g/heart-api.git"
      path: "shared/heart_models"
      ref: "main"
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  sign_in_with_apple: ^7.0.1

resolution: workspace

dev_dependencies:
  flutter_test: { sdk: flutter }
  flutter_lints: ^6.0.0
  mockito: ^5.6.1
  build_runner: ^2.10.4
  firebase_auth_mocks: ^0.15.0
  coverage: ^1.3.0
